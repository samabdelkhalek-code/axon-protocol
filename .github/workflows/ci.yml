name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace -- --nocapture

      - name: Build release
        run: cargo build --workspace --release

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  move-build:
    name: Move contract build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SUI CLI
        run: |
          curl -fsSL https://github.com/MystenLabs/sui/releases/latest/download/sui-ubuntu-x86_64.tgz \
            | tar -xzf - -C /usr/local/bin
        continue-on-error: true  # SUI binary not always available; Move linting is bonus
      - name: Check Move source syntax
        run: |
          if command -v sui &>/dev/null; then
            sui move build --path contracts/axon
          else
            echo "SUI CLI not available — skipping Move build"
          fi
